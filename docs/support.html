<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WhatCable Pro - Support</title>
    <meta name="robots" content="noindex">
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        color-scheme: light;
        --ink: #0e1620;
        --ink-soft: #364152;
        --muted: #6a7585;
        --line: #e3e8ef;
        --bg: #fafbfc;
        --panel: #ffffff;
        --accent: #0c8ca6;
        --accent-strong: #0a7188;
        --good: #0b8a5a;
        --good-soft: #e6f4ee;
        --error: #dc2626;
        --error-soft: #fef2f2;
        --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04), 0 1px 3px rgba(15, 23, 42, 0.06);
        --shadow-md: 0 6px 16px rgba(15, 23, 42, 0.08), 0 2px 4px rgba(15, 23, 42, 0.04);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 16px;
        line-height: 1.55;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      a { color: inherit; text-decoration: none; }

      .nav {
        background: rgba(250, 251, 252, 0.85);
        backdrop-filter: saturate(180%) blur(12px);
        border-bottom: 1px solid var(--line);
      }

      .nav-inner {
        width: min(1120px, calc(100% - 40px));
        margin: 0 auto;
        height: 64px;
        display: flex;
        align-items: center;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-weight: 700;
        font-size: 16px;
        color: var(--ink);
      }

      .mark {
        width: 28px;
        height: 28px;
        display: block;
        border-radius: 7px;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.12);
      }

      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 48px 20px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 16px;
        box-shadow: var(--shadow-md);
        padding: 48px;
        max-width: 540px;
        width: 100%;
      }

      h1 {
        font-size: 24px;
        font-weight: 700;
        margin: 0 0 8px;
        color: var(--ink);
      }

      .subtitle {
        color: var(--ink-soft);
        margin: 0 0 32px;
        font-size: 15px;
      }

      label {
        display: block;
        font-size: 14px;
        font-weight: 500;
        color: var(--ink);
        margin-bottom: 6px;
      }

      input, textarea {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        font-family: inherit;
        font-size: 15px;
        color: var(--ink);
        background: var(--bg);
        outline: none;
        transition: border-color 0.15s;
      }

      input:focus, textarea:focus {
        border-color: var(--accent);
      }

      textarea {
        resize: vertical;
        min-height: 120px;
      }

      .field {
        margin-bottom: 20px;
      }

      .field-hint {
        font-size: 12px;
        color: var(--muted);
        margin-top: 4px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 24px;
        border: none;
        border-radius: 10px;
        font-family: inherit;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
        width: 100%;
        background: var(--accent);
        color: white;
      }

      .button:hover { background: var(--accent-strong); }
      .button:disabled { opacity: 0.6; cursor: not-allowed; }

      .status {
        margin-top: 16px;
        padding: 12px 14px;
        border-radius: 8px;
        font-size: 14px;
        display: none;
      }

      .status.error {
        display: block;
        background: var(--error-soft);
        color: var(--error);
        border: 1px solid #fecaca;
      }

      .status.success {
        display: block;
        background: var(--good-soft);
        color: var(--good);
        border: 1px solid #bbf7d0;
      }
    </style>
  </head>
  <body>
    <nav class="nav">
      <div class="nav-inner">
        <a href="/" class="brand">
          <img src="icon.png" alt="WhatCable" class="mark">
          WhatCable
        </a>
      </div>
    </nav>

    <main>
      <div class="card">
        <h1>Pro Support</h1>
        <p class="subtitle">Enter your licence key and we'll get back to you by email.</p>

        <form id="support-form">
          <div class="field">
            <label for="key">Licence key</label>
            <input type="text" id="key" name="key" placeholder="XXXX-XXXX-XXXX-XXXX" required autocomplete="off" spellcheck="false">
            <div class="field-hint">Right-click WhatCable in the menu bar, then click Licence to find your key.</div>
          </div>

          <div class="field">
            <label for="email">Your email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required>
          </div>

          <div class="field">
            <label for="message">How can we help?</label>
            <textarea id="message" name="message" placeholder="Describe the issue or question..." required></textarea>
          </div>

          <button type="submit" class="button" id="submit-btn">Send message</button>
          <div id="status" class="status"></div>
        </form>
      </div>
    </main>

    <script>
      const form = document.getElementById("support-form");
      const btn = document.getElementById("submit-btn");
      const status = document.getElementById("status");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        status.className = "status";
        status.textContent = "";
        btn.disabled = true;
        btn.textContent = "Sending...";

        try {
          const res = await fetch("https://whatcable.uk/api/support", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              key: document.getElementById("key").value.trim(),
              email: document.getElementById("email").value.trim(),
              message: document.getElementById("message").value.trim(),
            }),
          });

          const data = await res.json();

          if (res.ok) {
            status.className = "status success";
            status.textContent = "Message sent. We'll reply by email.";
            form.reset();
          } else if (res.status === 403) {
            status.className = "status error";
            status.textContent = "That licence key wasn't recognised. Please check and try again.";
          } else {
            status.className = "status error";
            status.textContent = data.error || "Something went wrong. Please try again.";
          }
        } catch {
          status.className = "status error";
          status.textContent = "Could not reach the server. Please try again later.";
        }

        btn.disabled = false;
        btn.textContent = "Send message";
      });
    </script>
  </body>
</html>
